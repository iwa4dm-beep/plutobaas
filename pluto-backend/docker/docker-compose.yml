services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pluto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set; run docker compose with --env-file .env from the repo root}
      POSTGRES_DB: pluto
    volumes:
      - pluto_pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - pluto_redis:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set; run docker compose with --env-file .env from the repo root}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set; run docker compose with --env-file .env from the repo root}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - pluto_minio:/data

  api:
    build:
      context: ..
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:3000:3000"
    # Fail-fast healthcheck — the container is marked unhealthy (and stopped
    # by orchestrators) if /health/migrations does not return 200. That
    # endpoint fails if the auth.* shim is missing, if _pluto_migrations is
    # unreachable, or if the audit_log schema drifted. See routes/health.ts.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=3 http://127.0.0.1:3000/health/migrations >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  pluto_pg:
  pluto_redis:
  pluto_minio:
