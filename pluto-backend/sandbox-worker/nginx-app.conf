# Nginx site for app.timescard.cloud — serves the frontend bundle unpacked by
# pluto-sandbox-worker into /var/lib/pluto/sites/<workspaceId>/current/.
#
# Copy to /etc/nginx/sites-available/app.timescard.cloud, adjust the workspace
# ID, symlink into sites-enabled, and run `sudo certbot --nginx -d app.timescard.cloud`.

server {
    listen 80;
    listen [::]:80;
    server_name app.timescard.cloud;

    # ACME challenges land here before HTTPS is provisioned.
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.timescard.cloud;

    # Set by certbot after successful issuance:
    # ssl_certificate     /etc/letsencrypt/live/app.timescard.cloud/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.timescard.cloud/privkey.pem;

    # ⚠ REPLACE <WORKSPACE_ID> with the actual workspace UUID you deployed to.
    root /var/lib/pluto/sites/<WORKSPACE_ID>/current;
    index index.html;

    # SPA fallback — TanStack Router / React Router deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache immutable build assets.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Never cache the HTML shell — new deploys must be picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
