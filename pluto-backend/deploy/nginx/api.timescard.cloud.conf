# Nginx reverse proxy for Pluto API — api.timescard.cloud
# Install: bash deploy/install-nginx-site.sh api.timescard.cloud
#
# HTTP/3 (QUIC): OFF by default. To enable, uncomment the `listen 443 quic`
# lines in the HTTPS server block AND `add_header Alt-Svc` below.
# Requires nginx built with --with-http_v3_module (Ubuntu 24.04+ default).

# --- HTTP -> HTTPS redirect (also serves ACME challenges) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.timescard.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    # --- HTTP/3 toggle (uncomment 3 lines below to enable) ---
    # listen 443 quic reuseport;
    # listen [::]:443 quic reuseport;
    # add_header Alt-Svc 'h3=":443"; ma=86400' always;

    server_name api.timescard.cloud;

    ssl_certificate     /etc/letsencrypt/live/api.timescard.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.timescard.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # OCSP stapling — Let's Encrypt issues certs WITHOUT an OCSP URL in the
    # cert extension (they're transitioning off OCSP), so stapling is silently
    # ignored. Explicitly off to remove `ssl_stapling ignored` warnings.
    ssl_stapling off;
    ssl_stapling_verify off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 100M;
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_connection;
    }
}
