# Nginx reverse proxy for Pluto API — api.timescard.cloud
# Place at: /etc/nginx/sites-available/api.timescard.cloud
# Symlink:  /etc/nginx/sites-enabled/api.timescard.cloud

# --- HTTP -> HTTPS redirect (also serves ACME challenges) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.timescard.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.timescard.cloud;

    # Certbot fills these in
    ssl_certificate     /etc/letsencrypt/live/api.timescard.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.timescard.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size for uploads (tune to your S3/multipart needs)
    client_max_body_size 100M;

    # Long-lived connections for websockets / SSE (realtime routes)
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_connection;
    }
}
