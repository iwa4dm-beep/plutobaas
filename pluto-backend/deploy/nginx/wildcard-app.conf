# Wildcard subdomain host for Pluto — *.app.timescard.app
#
# Serves any workspace slug by resolving:
#   https://<slug>.app.timescard.app
#     → /var/lib/pluto/sites/<slug>/current/    (symlink written by sandbox-worker)
#
# Install:
#   sudo bash pluto-backend/deploy/install-wildcard-tls.sh app.timescard.app
#   sudo cp pluto-backend/deploy/nginx/wildcard-app.conf \
#           /etc/nginx/sites-available/wildcard-app.timescard.app.conf
#   sudo ln -sf /etc/nginx/sites-available/wildcard-app.timescard.app.conf \
#               /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS (one-time, at your registrar):
#   *.app.timescard.app   A   <VPS_IP>
#   app.timescard.app     A   <VPS_IP>
#
# Wildcard TLS is issued via ACME DNS-01 (see install-wildcard-tls.sh).

# Extract "<slug>" from Host: <slug>.app.timescard.app or <slug>-dev.app…
# Empty string when the Host header doesn't match — that request is 404'd below.
map $host $pluto_ws_slug {
    default                                                                                    "";
    "~^(?<slug>[a-z0-9](?:[a-z0-9-]{1,38}[a-z0-9])?)(?:-dev)?\.app\.timescard\.app$"         $slug;
}

# Phase E — channel routing:
#   <slug>.app.timescard.app       → /var/lib/pluto/sites/<slug>/current   (published)
#   <slug>-dev.app.timescard.app   → /var/lib/pluto/sites/<slug>/preview   (latest)
map $host $pluto_channel {
    default                                                                                    "current";
    "~^[a-z0-9](?:[a-z0-9-]{1,38}[a-z0-9])?-dev\.app\.timescard\.app$"                       "preview";
}

# --- HTTP → HTTPS (also serves HTTP-01 fallback if you ever add it) ---
server {
    listen      80;
    listen [::]:80;
    server_name *.app.timescard.app app.timescard.app;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location /                            { return 301 https://$host$request_uri; }
}

# --- HTTPS wildcard ---
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name *.app.timescard.app app.timescard.app;

    # Wildcard cert (issued via ACME DNS-01)
    ssl_certificate     /etc/letsencrypt/live/app.timescard.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.timescard.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 100M;

    # Phase F — per-slug JSON access log + per-IP-per-slug rate limit.
    # `limit_req_zone` + `log_format` live in nginx-slug-logging.conf; include
    # it from /etc/nginx/conf.d/ so the zone is declared at http{} scope.
    access_log /var/log/nginx/pluto-slugs.log pluto_slug_json;
    limit_req  zone=pluto_slug_rps burst=40 nodelay;
    limit_req_status 429;

    # No slug parsed → not a workspace subdomain. Serve the parking page /
    # a friendly 404 so the apex `app.timescard.app` doesn't leak errors.
    if ($pluto_ws_slug = "") {
        return 404;
    }

    # Slug looks valid but no bundle yet → nginx returns 404 from try_files.
    # We route it through @not_deployed for a nicer page.
    root  /var/lib/pluto/sites/$pluto_ws_slug/$pluto_channel;
    index index.html;

    # Expose channel to the app (client can render a "Preview build" banner).
    add_header X-Pluto-Channel $pluto_channel always;

    location / {
        try_files $uri $uri/ /index.html @not_deployed;
    }

    # Long-cache immutable assets.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri @not_deployed;
    }

    # Never cache the shell — new deploys pick up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    location @not_deployed {
        default_type text/html;
        return 404 '<!doctype html><meta charset=utf-8><title>Not deployed</title><body style="font-family:system-ui;padding:3rem;max-width:36rem;margin:auto"><h1>Not deployed yet</h1><p>The project <code>$pluto_ws_slug</code> is registered but has no live bundle.</p><p>Push a build from the Pluto dashboard to activate this subdomain.</p></body>';
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
