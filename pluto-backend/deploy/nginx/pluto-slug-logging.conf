# Per-slug access log for wildcard-app.timescard.cloud (Phase F).
#
# Include this from wildcard-app.conf (already updated to emit `pluto_ws_slug`
# and `pluto_channel`). The log format is stable JSON; parse-nginx-logs.sh
# consumes it and rolls up into admin.project_usage.

log_format pluto_slug_json escape=json '{'
    '"ts":"$time_iso8601",'
    '"slug":"$pluto_ws_slug",'
    '"channel":"$pluto_channel",'
    '"host":"$host",'
    '"remote":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"rt":$request_time,'
    '"ua":"$http_user_agent",'
    '"ref":"$http_referer"'
'}';

# Per-IP token bucket, keyed by slug+IP so one noisy tenant doesn't
# throttle another. Defaults come from admin.quota_defaults; overrides in
# admin.project_quotas are applied by an out-of-band nginx-reload path
# (out of scope for this template — start with defaults).
limit_req_zone $binary_remote_addr$pluto_ws_slug zone=pluto_slug_rps:16m rate=20r/s;

# Access log path — the parser tails this file. Owned by www-data, readable
# by the pluto system user.
access_log /var/log/nginx/pluto-slugs.log pluto_slug_json;
