# Pluto sandbox — public static serving passthrough.
# Include this snippet INSIDE the api.timescard.cloud HTTPS `server { ... }` block.
# Managed by deploy/install-sites-proxy.sh — do NOT hand-edit the AUTO markers.

# --- BEGIN pluto-sites-proxy (AUTO) ---
gzip                on;
gzip_vary           on;
gzip_proxied        any;
gzip_comp_level     6;
gzip_min_length     1024;
gzip_types          text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml application/wasm font/ttf font/woff font/woff2;

location /sites/ {
    proxy_pass         http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_intercept_errors off;
    # Honour the ETag/Cache-Control the worker sets; keep it fresh on refresh.
    proxy_set_header   If-None-Match     $http_if_none_match;
}
location /preview/ {
    proxy_pass         http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_intercept_errors off;
    proxy_set_header   If-None-Match     $http_if_none_match;
}
location /site-status/ {
    proxy_pass         http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_read_timeout 10s;
    add_header         Cache-Control     "no-store" always;
}
location /sandbox/ {
    proxy_pass         http://127.0.0.1:8787/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 180s;
    proxy_intercept_errors off;
}
# --- END pluto-sites-proxy (AUTO) ---
