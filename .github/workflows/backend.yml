name: backend

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend.yml"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production after tests pass"
        type: boolean
        default: false

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/apps/server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pluto
          POSTGRES_PASSWORD: pluto
          POSTGRES_DB: pluto_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pluto -d pluto_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://pluto:pluto@localhost:5432/pluto_test
      JWT_SECRET: ci-jwt-secret-min-32-chars-xxxxxxxxxxxxxxxxxxx
      ANON_KEY: pk_anon_ci
      SERVICE_ROLE_KEY: sk_service_ci
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /tmp/pluto-storage
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/apps/server/package.json
      - run: npm install --no-audit --no-fund
      - name: typecheck + build
        run: npm run build
      - name: migrate (dry-run)
        run: npx tsx src/db/migrate.ts --dry-run
      - name: migrate (apply)
        run: npx tsx src/db/migrate.ts
      - name: rls policy regression (fails on missing workspace policy)
        run: node scripts/check-rls.mjs
      - name: sql validator tests
        run: npx vitest run src/__tests__/sql-validator.test.ts --reporter=default
      - name: workspace isolation e2e
        run: npx vitest run src/__tests__/workspace-isolation.test.ts --reporter=default
      - name: admin auth integration
        run: npx vitest run src/__tests__/admin.integration.test.ts --reporter=default
      - name: auth flow e2e (refresh rotation, expiry, sign-out, lockout)
        env:
          PLUTO_E2E_DATABASE_URL: postgres://pluto:pluto@localhost:5432/pluto_test
        run: npx vitest run src/__tests__/auth-flow.e2e.test.ts src/__tests__/ratelimit.test.ts --reporter=default
      - name: full unit + integration suite
        run: npm test -- --reporter=default

  storage-e2e:
    name: storage end-to-end (signed URLs + multipart + RLS)
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pluto
          POSTGRES_PASSWORD: pluto
          POSTGRES_DB: pluto_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pluto -d pluto_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://pluto:pluto@localhost:5432/pluto_test
      JWT_SECRET: ci-jwt-secret-min-32-chars-xxxxxxxxxxxxxxxxxxx
      ANON_KEY: pk_anon_ci
      SERVICE_ROLE_KEY: sk_service_ci
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /tmp/pluto-storage-ci
      PORT: "8788"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/apps/server/package.json
      - name: install
        working-directory: backend/apps/server
        run: npm install --no-audit --no-fund
      - name: run storage e2e
        run: bash backend/scripts/e2e-storage-ci.sh

  client-gen-smoke:
    name: typed-client codegen smoke (incl. storage surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install root deps
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: generate + typecheck emitted client (fixture schema)
        run: npx tsx scripts/smoke-gen-client.mts
      - name: generate + typecheck emitted client (live schema from server)
        # Boot the server just long enough to serve /admin/v1/schema, then
        # run the same generator against it. Catches drift between the
        # real REST/storage schema and the typed client on every PR.
        env:
          DATABASE_URL: postgres://pluto:pluto@localhost:5432/pluto_livegen
          JWT_SECRET: ci-jwt-secret-min-32-chars-xxxxxxxxxxxxxxxxxxx
          ANON_KEY: pk_anon_ci
          SERVICE_ROLE_KEY: sk_service_ci
          STORAGE_DRIVER: local
          STORAGE_LOCAL_DIR: /tmp/pluto-livegen
          PORT: "8799"
        run: |
          docker run -d --name pg-livegen -e POSTGRES_USER=pluto -e POSTGRES_PASSWORD=pluto \
            -e POSTGRES_DB=pluto_livegen -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec pg-livegen pg_isready -U pluto -d pluto_livegen && break; sleep 1
          done
          cd backend/apps/server && npm install --no-audit --no-fund
          npx tsx src/db/migrate.ts
          npx tsx src/index.ts > /tmp/pluto-livegen.log 2>&1 &
          echo $! > /tmp/pluto-livegen.pid
          for i in $(seq 1 40); do
            curl -fsS "http://localhost:$PORT/readyz" >/dev/null 2>&1 && break; sleep 0.5
          done
          cd - >/dev/null
          PLUTO_SMOKE_URL="http://localhost:$PORT" PLUTO_SMOKE_ANON_KEY="$ANON_KEY" \
            npx tsx scripts/smoke-gen-client.mts
          kill "$(cat /tmp/pluto-livegen.pid)" || true
          docker rm -f pg-livegen || true

  pitr-drill:
    name: cross-region PITR drill (dry-run) + report
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pluto
          POSTGRES_PASSWORD: pluto
          POSTGRES_DB: pluto_pitr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pluto -d pluto_pitr"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://pluto:pluto@localhost:5432/pluto_pitr
      JWT_SECRET: ci-jwt-secret-min-32-chars-xxxxxxxxxxxxxxxxxxx
      ANON_KEY: pk_anon_ci
      SERVICE_ROLE_KEY: sk_service_ci
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /tmp/pluto-pitr
      PLUTO_ENABLE_PITR: "1"
      PORT: "8790"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        working-directory: backend/apps/server
        run: npm install --no-audit --no-fund
      - name: migrate
        working-directory: backend/apps/server
        run: npx tsx src/db/migrate.ts
      - name: boot server
        working-directory: backend/apps/server
        run: |
          npx tsx src/index.ts > /tmp/pluto-pitr.log 2>&1 &
          echo $! > /tmp/pluto-pitr.pid
          for i in $(seq 1 40); do
            curl -fsS "http://localhost:$PORT/readyz" >/dev/null 2>&1 && break; sleep 0.5
          done
      - name: seed pitr control plane (enable archive + register snapshot)
        env:
          BASE_URL: http://localhost:8790
        run: |
          curl -fsS -X POST "$BASE_URL/pitr/v1/config" \
            -H "authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "content-type: application/json" \
            -d '{"enabled":true,"archive_url":"file:///tmp/pluto-pitr/wal","retention_days":7}'
          curl -fsS -X POST "$BASE_URL/pitr/v1/snapshots" \
            -H "authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "content-type: application/json" \
            -d '{"storage_url":"file:///tmp/pluto-pitr/base-000","kind":"basebackup","bytes":1024,"lsn":"0/1000000"}'
          curl -fsS -X POST "$BASE_URL/pitr/v1/replicas" \
            -H "authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "content-type: application/json" \
            -d '{"source_id":"00000000-0000-0000-0000-000000000000","source_kind":"pitr","region":"us-west-2","target_url":"s3://pluto-dr/us-west-2/base-000","status":"ok"}' || true
      - name: run drill (dry-run, publishes RPO/RTO + correctness report)
        env:
          BASE_URL: http://localhost:8790
          PITR_REPORT_FILE: ${{ github.workspace }}/pitr-drill-report.md
        run: |
          chmod +x backend/scripts/pitr-drill.sh
          backend/scripts/pitr-drill.sh
          cat "$PITR_REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
      - name: shutdown server
        if: always()
        run: kill "$(cat /tmp/pluto-pitr.pid)" || true
      - name: upload drill report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pitr-drill-report
          path: pitr-drill-report.md
          if-no-files-found: warn

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        run: npm install --no-audit --no-fund --legacy-peer-deps
      - name: typecheck + build
        run: npm run build

  docker:
    name: docker image
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/apps/server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/pluto:latest
            ghcr.io/${{ github.repository }}/pluto:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy to VPS
    needs: docker
    if: |
      github.event_name == 'workflow_dispatch' && inputs.deploy == true ||
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency: production-deploy
    steps:
      - uses: actions/checkout@v4
      - name: render .env from repo secrets + .env.cloud.example
        working-directory: backend
        run: |
          cp .env.cloud.example .env
          # Overwrite every placeholder from GitHub Environment secrets.
          set_kv() { sed -i "s|^$1=.*|$1=$2|" .env; }
          set_kv DOMAIN               "${{ secrets.PLUTO_DOMAIN }}"
          set_kv ACME_EMAIL           "${{ secrets.PLUTO_ACME_EMAIL }}"
          set_kv POSTGRES_PASSWORD    "${{ secrets.PLUTO_POSTGRES_PASSWORD }}"
          set_kv DATABASE_URL         "postgres://pluto:${{ secrets.PLUTO_POSTGRES_PASSWORD }}@postgres:5432/pluto"
          set_kv JWT_SECRET           "${{ secrets.PLUTO_JWT_SECRET }}"
          set_kv ANON_KEY             "${{ secrets.PLUTO_ANON_KEY }}"
          set_kv SERVICE_ROLE_KEY     "${{ secrets.PLUTO_SERVICE_ROLE_KEY }}"
          set_kv S3_ACCESS_KEY        "${{ secrets.PLUTO_S3_ACCESS_KEY }}"
          set_kv S3_SECRET_KEY        "${{ secrets.PLUTO_S3_SECRET_KEY }}"
          set_kv SMTP_URL             "${{ secrets.PLUTO_SMTP_URL }}"
          set_kv CORS_ORIGIN          "${{ secrets.PLUTO_CORS_ORIGIN }}"
      - name: ship code + .env to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   "backend/"
          target:   "/opt/pluto/"
          strip_components: 0
      - name: run deploy-cloud.sh on host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/pluto/backend
            chmod +x scripts/*.sh
            IMAGE_TAG=${{ github.sha }} ./scripts/deploy-cloud.sh
      - name: smoke test
        run: |
          curl -fsS "https://${{ secrets.PLUTO_DOMAIN }}/healthz"
          curl -fsS "https://${{ secrets.PLUTO_DOMAIN }}/readyz"
