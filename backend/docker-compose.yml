version: "3.9"

# Wave 3 boot smoke test — Postgres + MinIO + Pluto server.
# Usage:
#   cd backend && docker compose up -d db minio
#   ./scripts/smoke-boot.sh
# The smoke script waits for /readyz to return 200.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pluto
      POSTGRES_PASSWORD: pluto
      POSTGRES_DB: pluto
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pluto -d pluto"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pluto_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio1234
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pluto_s3:/data

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    depends_on:
      db: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgres://pluto:pluto@db:5432/pluto
      JWT_SECRET: dev-jwt-secret-change-me-please-32bytes
      ANON_KEY: dev-anon-key
      SERVICE_ROLE_KEY: dev-service-role-key
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio1234
      S3_BUCKET: pluto
      S3_FORCE_PATH_STYLE: "1"
      PLUTO_ENABLE_OBSERVABILITY: "1"
      PLUTO_ENABLE_SCALING: "1"
      PLUTO_ENABLE_AI: "0"
      PLUTO_ENABLE_LEGACY: "0"
    ports: ["3000:3000"]

volumes:
  pluto_pg: {}
  pluto_s3: {}
