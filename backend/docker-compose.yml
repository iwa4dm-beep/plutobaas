# Local development stack — matches .env.local.example.
# Start:  ./scripts/deploy-local.sh   (or: docker compose up -d)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pluto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pluto-dev}
      POSTGRES_DB: ${POSTGRES_DB:-pluto}
    ports: ["54329:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pluto} -d ${POSTGRES_DB:-pluto}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI

  pluto:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    env_file: [.env]
    environment:
      # values here override .env for docker-internal hostnames
      DATABASE_URL: postgres://${POSTGRES_USER:-pluto}:${POSTGRES_PASSWORD:-pluto-dev}@postgres:5432/${POSTGRES_DB:-pluto}
      S3_ENDPOINT: http://minio:9000
      SMTP_URL: smtp://mailpit:1025
      PORT: "8787"
      MIGRATE_ON_BOOT: "1"
      MIGRATE_DRY_RUN_FIRST: "1"
    volumes:
      - pluto_storage:/var/lib/pluto/storage
    ports: ["8787:8787"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/readyz"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  pg_data:
  minio_data:
  pluto_storage:
