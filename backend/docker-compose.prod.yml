# Production overlay. Use:
#   cp .env.example .env && $EDITOR .env
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d
version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [api]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_URL: "postgres://pluto:${POSTGRES_PASSWORD}@postgres:5432/pluto"
      JWT_SECRET: ${JWT_SECRET}
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_LOCAL_DIR: /var/lib/pluto/storage
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-pluto}
      S3_REGION: ${S3_REGION:-us-east-1}
      SMTP_URL: ${SMTP_URL:-smtp://mailpit:1025}
    volumes:
      - pluto_storage:/var/lib/pluto/storage
    # Do not expose api directly; Caddy proxies it.
    ports: []

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: []  # keep DB internal in prod

  minio:
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports: []  # internal only; front with Caddy separately if you need the console

  mailpit:
    ports: []

volumes:
  caddy_data:
  caddy_config:
  pluto_storage:
